<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Cars | CarShowroom</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --brand:#2563eb;
      --brand2:#7c3aed;
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:rgba(15, 23, 42, .08);
      --shadow: 0 12px 30px rgba(2, 6, 23, .08);
      --dark:#020617;
    }

    html,body{
      height:100%;
    }

    body{
      background: var(--bg);
      color:var(--text);
      display:flex;
      flex-direction:column;
    }

    main{
      flex:1;
    }

    /* NAVBAR */
    .navbar{
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .brand-badge{
      width:40px;
      height:40px;
      border-radius:12px;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:700;
      box-shadow: var(--shadow);
    }

    .nav-link{ color:#0f172a !important; font-weight:500; }
    .nav-link.active{ color:var(--brand) !important; }

    .btn-soft{
      background: rgba(37,99,235,.08);
      border: 1px solid rgba(37,99,235,.18);
      color: var(--brand);
    }

    /* HERO */
    .hero{
      border-radius:24px;
      background:
        radial-gradient(1200px 400px at 10% -10%, rgba(37,99,235,.35), transparent 55%),
        radial-gradient(1200px 400px at 90% -10%, rgba(124,58,237,.35), transparent 55%),
        linear-gradient(135deg, rgba(255,255,255,.8), rgba(255,255,255,.55));
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .hero .title{
      font-size: clamp(24px, 3vw, 40px);
      font-weight:800;
    }

    .hero .sub{ color:var(--muted); }

    .cardx{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
    }

    .chip{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15,23,42,.04);
      border:1px solid var(--border);
      color:var(--muted);
    }

    /* FOOTER */
    footer{
      background: linear-gradient(135deg, #020617, #020617);
      color:#cbd5f5;
      padding:22px 0;
    }

    footer a{
      color:#cbd5f5;
      text-decoration:none;
    }

    footer a:hover{
      color:#ffffff;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container py-2">
    <a class="navbar-brand d-flex align-items-center gap-2" href="dashboard.html">
      <span class="brand-badge">CS</span>
      <div class="d-flex flex-column lh-1">
        <span class="fw-bold">CarShowroom</span>
        <small class="text-secondary">Customer Panel</small>
      </div>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2 me-1"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="inventory.html"><i class="bi bi-car-front me-1"></i> Browse Cars</a></li>
        <li class="nav-item"><a class="nav-link" href="car.details.html"><i class="bi bi-collection me-1"></i> My Cars</a></li>
        <li class="nav-item"><a class="nav-link" href="bookings.html"><i class="bi bi-calendar-check me-1"></i> Bookings</a></li>
        <li class="nav-item"><a class="nav-link" href="my-profile.html"><i class="bi bi-person-circle me-1"></i> Profile</a></li>
        <li class="nav-item ms-lg-2">
          <button class="btn btn-soft btn-sm px-3">
            <i class="bi bi-box-arrow-right me-1"></i> Logout
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-4">

</main>

<!-- FOOTER -->
<footer>
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
    <div>© 2025 CarShowroom — Customer Panel</div>
    <div class="d-flex gap-4">
      <a href="terms.html">Terms</a>
      <a href="privacy.html">Privacy</a>
      <a href="contact.html">Support</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
