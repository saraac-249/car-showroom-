<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Cars | CarRental</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --brand:#2563eb; --brand2:#7c3aed; --bg:#f6f7fb; --card:#fff;
      --text:#0f172a; --muted:#64748b; --border:rgba(15,23,42,.08);
      --shadow:0 12px 30px rgba(2,6,23,.08);
    }
    body{ background:var(--bg); color:var(--text); }
    .navbar{ background:rgba(255,255,255,.85); backdrop-filter: blur(10px); border-bottom:1px solid var(--border); }
    .brand-badge{
      width:40px; height:40px; border-radius:12px;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      display:grid; place-items:center; color:#fff; box-shadow:var(--shadow); font-weight:800;
    }
    .cardx{ background:var(--card); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); }
    .car-img{ width:100%; height:170px; object-fit:cover; background:#eef2ff; }
    .muted{ color:var(--muted); }
    .chip{
      font-size:12px; padding:6px 10px; border-radius:999px;
      background:rgba(15,23,42,.04); border:1px solid var(--border); color:var(--muted);
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container py-2">
    <a class="navbar-brand d-flex align-items-center gap-2" href="dashboard.html">
      <span class="brand-badge">CR</span>
      <div class="d-flex flex-column lh-1">
        <span class="fw-bold">CarRental</span>
        <small class="text-secondary">Customer Panel</small>
      </div>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2 me-1"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="inventory.html"><i class="bi bi-car-front me-1"></i> Browse Cars</a></li>
        <li class="nav-item"><a class="nav-link active" href="car.details.html"><i class="bi bi-collection me-1"></i> My Cars</a></li>
        <li class="nav-item"><a class="nav-link" href="bookings.html"><i class="bi bi-calendar-check me-1"></i> Bookings</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html"><i class="bi bi-person-circle me-1"></i> Profile</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-4">

  <section class="cardx p-4 mb-3">
    <div class="d-flex flex-column flex-md-row justify-content-between gap-2 align-items-md-center">
      <div>
        <h3 class="mb-1 fw-bold">My Cars</h3>
        <p class="muted mb-0">Your saved and wishlist cars will appear here.</p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <span class="chip">Total: <b id="carsCount">0</b></span>
        <a href="inventory.html" class="btn btn-outline-primary">
          <i class="bi bi-search me-1"></i> Browse More
        </a>
        <button class="btn btn-outline-danger" id="btnClearAll">
          <i class="bi bi-trash3 me-1"></i> Clear All
        </button>
      </div>
    </div>
  </section>

  <section class="row g-3" id="carsGrid"></section>

  <section class="cardx p-4 text-center d-none" id="emptyState">
    <i class="bi bi-emoji-frown fs-2"></i>
    <h5 class="mt-2 mb-1">No Saved Cars</h5>
    <p class="muted mb-0">
      Add cars from the inventory and they will be displayed here.
    </p>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {

    const safeParse = (key, fallback) => {
      try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
      catch { return fallback; }
    };

    const loadCars = () => {
      const csCars = safeParse("cs_cars", []);
      if (Array.isArray(csCars) && csCars.length) return csCars;
      const cartItems = safeParse("cartItems", []);
      return Array.isArray(cartItems) ? cartItems : [];
    };

    const saveCars = (cars) => {
      localStorage.setItem("cs_cars", JSON.stringify(cars));
    };

    const carsGrid = document.getElementById("carsGrid");
    const emptyState = document.getElementById("emptyState");
    const carsCount = document.getElementById("carsCount");
    const btnClearAll = document.getElementById("btnClearAll");

    const normalizeCar = (c) => {
      const name = c?.name || c?.title || c?.carName || "Car";
      const brand = c?.brand || c?.make || "";
      const model = c?.model || "";
      const price = c?.pricePerDay ?? c?.price ?? c?.rent ?? "";
      const img = c?.image || c?.img || c?.photo || "https://picsum.photos/600/400?random=7";
      const id = c?.id || c?._id || c?.carId || (name + "|" + brand + "|" + model);
      return { ...c, id, name, brand, model, price, img };
    };

    const render = () => {
      const cars = loadCars().map(normalizeCar);
      carsCount.textContent = cars.length;

      if (!cars.length) {
        carsGrid.innerHTML = "";
        emptyState.classList.remove("d-none");
        return;
      }

      emptyState.classList.add("d-none");

      carsGrid.innerHTML = cars.map((c) => `
        <div class="col-md-6 col-lg-4">
          <div class="cardx overflow-hidden h-100">
            <img class="car-img" src="${c.img}" alt="${c.name}">
            <div class="p-3">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <div>
                  <div class="fw-bold">${c.name}</div>
                  <div class="muted small">${[c.brand, c.model].filter(Boolean).join(" • ") || "—"}</div>
                </div>
                <span class="chip">${c.price ? ("Rs " + c.price + "/day") : "Saved"}</span>
              </div>

              <div class="d-flex gap-2 mt-3 flex-wrap">
                <a class="btn btn-primary btn-sm" href="inventory.html">
                  <i class="bi bi-search me-1"></i> Browse
                </a>
                <button class="btn btn-outline-danger btn-sm" data-remove="${encodeURIComponent(c.id)}">
                  <i class="bi bi-trash3 me-1"></i> Remove
                </button>
              </div>
            </div>
          </div>
        </div>
      `).join("");

      carsGrid.querySelectorAll("[data-remove]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = decodeURIComponent(btn.getAttribute("data-remove"));
          const updated = loadCars().map(normalizeCar).filter(x => x.id !== id);
          saveCars(updated);
          render();
        })
      });
    };

    btnClearAll.addEventListener("click", () => {
      if (!confirm("Are you sure you want to clear all saved cars?")) return;
      saveCars([]);
      render();
    });

    render();
  });
</script>

</body>
</html>
