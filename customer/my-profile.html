<!DOCTYPE html>
<html lang="en" style="visibility:hidden;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile | CarShowroom</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/customer-auth.js"></script>
  <script>
    CustomerAuth.requireAuthEarly("./login.html");
  </script>

  <!-- Dark Greyish Theme (Only styling, logic same) -->
  <style>
    :root{
      --bg: #0f1115;
      --panel: #171a20;
      --panel-2: #1e232b;
      --text: #e9edf3;
      --muted: #a9b2c3;
      --border: rgba(255,255,255,.12);
    }

    body{
      background: radial-gradient(1200px 600px at 15% 0%, #1a1f2a 0%, var(--bg) 55%) !important;
      color: var(--text);
    }

    .card{
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%) !important;
      border: 1px solid var(--border) !important;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .form-label{
      color: var(--text) !important;
    }

    .form-control{
      background: rgba(255,255,255,.06) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: 10px;
    }
    .form-control::placeholder{ color: rgba(233,237,243,.55) !important; }
    .form-control:focus{
      box-shadow: 0 0 0 .25rem rgba(120,130,150,.18) !important;
      border-color: rgba(200,210,230,.35) !important;
    }
    .form-control[readonly]{
      opacity: .85;
      cursor: not-allowed;
    }

    .btn-outline-secondary{
      border-color: var(--border) !important;
      color: var(--text) !important;
    }
    .btn-outline-secondary:hover{
      background: rgba(255,255,255,.08) !important;
    }

    /* Keep primary button, just slightly calmer */
    .btn-primary{
      background: #2f6fed !important;
      border-color: #2f6fed !important;
      border-radius: 10px;
    }
    .btn-primary:hover{
      background: #285fd0 !important;
      border-color: #285fd0 !important;
    }

    .small.text-secondary{
      color: var(--muted) !important;
    }
  </style>
</head>

<body>
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="fw-bold m-0">My Profile</h2>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="dashboard.html">Back</a>
        <button class="btn btn-primary" id="btnSave" type="button">Save Changes</button>
      </div>
    </div>

    <div class="card p-3">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Full Name</label>
          <input class="form-control" id="name" placeholder="Your name" />
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Email (read-only)</label>
          <input class="form-control" id="email" readonly />
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Phone</label>
          <input class="form-control" id="phone" placeholder="03xx-xxxxxxx" />
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">City</label>
          <input class="form-control" id="city" placeholder="City" />
        </div>
      </div>

      <!-- Roman English -> English -->
      <div class="small text-secondary mt-3">
        ✅ Data is saved in localStorage and also in the common AppDB for admin-side counting.
      </div>
    </div>
  </div>

  <script>
    const c = CustomerAuth.getCustomer();
    document.getElementById("email").value = c?.email || "";
    document.getElementById("name").value  = c?.name  || "";
    document.getElementById("phone").value = c?.phone || "";
    document.getElementById("city").value  = c?.city  || "";

    document.getElementById("btnSave").addEventListener("click", () => {
      const updated = CustomerAuth.setCustomer({
        email: c.email,
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        city: document.getElementById("city").value
      });
      alert("Profile saved!");
      // optional: go back
      // window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
