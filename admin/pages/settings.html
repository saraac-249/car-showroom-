<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings | Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-4">
    <h3 class="mb-3">Settings</h3>

    <form id="settingsForm" class="card p-3" style="max-width:520px;">
      <div class="mb-2">
        <label class="form-label">Showroom Name</label>
        <input class="form-control" name="showroomName" />
      </div>
      <div class="mb-2">
        <label class="form-label">Currency</label>
        <input class="form-control" name="currency" placeholder="PKR" />
      </div>
      <button class="btn btn-primary mt-2" type="submit">Save</button>
      <div id="saveMsg" class="small text-success mt-2 d-none">Saved!</div>
    </form>
  </main>

  <script src="../../assets/js/admin-auth.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/pages/admin/settings.js"></script>
</body>
</html>
