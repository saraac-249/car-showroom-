<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Cars</title>

  <!-- ✅ Correct paths (root based) -->
  <script src="/assets/js/admin-auth.js"></script>
  <script>
    AdminAuth.requireAuth("../login.html");
  </script>

  <script src="/assets/js/storage.js"></script>

  <style>
    body{ font-family: Arial, sans-serif; margin: 20px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; }
    input, select{ padding:10px; width: 220px; }
    button{ padding:10px 12px; cursor:pointer; }
    table{ width:100%; border-collapse: collapse; margin-top: 14px; }
    th,td{ border-bottom:1px solid #ddd; padding:10px; text-align:left; vertical-align:top; }
    th{ background:#f7f7f7; }
    .muted{ color:#666; font-size:12px; }
  </style>
</head>

<body>

  <h1>Cars</h1>

  <!-- ✅ Roman Urdu explanatory text REMOVED -->

  <div class="row" style="margin-top:12px;">
    <input id="name" placeholder="Car name (e.g. kia sorento)" />
    <input id="year" placeholder="Year (e.g. 2023)" />
    <input id="price" placeholder="Price (e.g. 16000000)" />
    <select id="status">
      <option>Available</option>
      <option>Reserved</option>
      <option>Sold</option>
    </select>
    <button id="btnAdd">Add Car</button>
    <button id="btnLogout">Logout</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Car</th>
        <th>Year</th>
        <th>Price</th>
        <th>Status</th>
        <th>Date</th>
        <th style="width:140px;">Action</th>
      </tr>
    </thead>
    <tbody id="tbl">
      <tr><td colspan="6" class="muted">No cars yet</td></tr>
    </tbody>
  </table>

<script>
  const tbl = document.getElementById("tbl");

  // ✅ Make filename from name: "Kia Sorento" -> "kia-sorento"
  function slugify(name){
    return String(name || "")
      .trim()
      .toLowerCase()
      .replace(/&/g, "and")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/-+/g, "-")
      .replace(/^-|-$/g, "");
  }

  // ✅ Admin stores image path (customer page will use it)
  // Admin page is 2 levels deep -> "../../images/cars/..."
  function autoImageFromName(name){
    const slug = slugify(name);
    if (!slug) return "";
    return "../../images/cars/" + slug + ".jpg";
  }

  function esc(s){
    return String(s ?? "").replace(/[<>&"]/g, c => ({
      "<":"&lt;", ">":"&gt;", "&":"&amp;", '"':"&quot;"
    }[c]));
  }

  function fmt(d){
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return "-";
    return dt.toLocaleString();
  }

  function render(){
    const cars = (window.AppDB && typeof AppDB.getCars === "function") ? AppDB.getCars() : [];
    if (!cars.length){
      tbl.innerHTML = `<tr><td colspan="6" class="muted">No cars yet</td></tr>`;
      return;
    }

    tbl.innerHTML = cars.map(c => `
      <tr>
        <td style="font-weight:800">${esc(c.name)}</td>
        <td>${esc(c.year)}</td>
        <td>${esc(c.price)}</td>
        <td>${esc(c.status)}</td>
        <td class="muted">${fmt(c.createdAt)}</td>
        <td>
          <button data-del="${c.id}" style="background:#fee2e2;">Delete</button>
        </td>
      </tr>
    `).join("");
  }

  document.getElementById("btnAdd").addEventListener("click", () => {
    const name = document.getElementById("name").value.trim();
    const year = document.getElementById("year").value.trim();
    const price = document.getElementById("price").value.trim();
    const status = document.getElementById("status").value;

    if (!name) { alert("Car name required"); return; }

    const imgPath = autoImageFromName(name);

    AppDB.addCar({
      name,
      year,
      price,
      status,
      images: imgPath ? [imgPath] : []
    });

    document.getElementById("name").value = "";
    document.getElementById("year").value = "";
    document.getElementById("price").value = "";
    document.getElementById("status").value = "Available";

    render();
  });

  tbl.addEventListener("click", (e) => {
    const delId = e.target?.getAttribute("data-del");
    if (delId){
      AppDB.deleteCar(delId);
      render();
    }
  });

  document.getElementById("btnLogout").addEventListener("click", () => {
    AdminAuth.logout();
    window.location.replace("../login.html");
  });

  render();
</script>

</body>
</html>
