<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cars | Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h3 class="mb-0">Cars</h3>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addCarModal">
        Add Car
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Car</th>
            <th>Year</th>
            <th>Price</th>
            <th>Status</th>
            <th>Images</th>
            <th class="text-end">Action</th>
          </tr>
        </thead>
        <tbody id="carsBody"></tbody>
      </table>
    </div>

    <div id="emptyState" class="text-center text-muted py-5 d-none">
      No cars found.
    </div>

    <!-- Add car modal -->
    <div class="modal fade" id="addCarModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <form class="modal-content" id="carForm">
          <div class="modal-header">
            <h5 class="modal-title">Add Car</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div class="row g-2">
              <div class="col-md-4">
                <label class="form-label">Make</label>
                <input class="form-control" name="make" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Model</label>
                <input class="form-control" name="model" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Year</label>
                <input class="form-control" name="year" type="number" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Price</label>
                <input class="form-control" name="price" type="number" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                  <option value="available">available</option>
                  <option value="reserved">reserved</option>
                  <option value="sold">sold</option>
                </select>
              </div>
              <div class="col-md-12">
                <label class="form-label">Images</label>
                <input class="form-control" id="carImages" name="images" type="file" multiple accept="image/*">
                <div class="form-text">Images localStorage me base64 ban kar save hongi.</div>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-light" type="button" data-bs-dismiss="modal">Close</button>
            <button class="btn btn-primary" type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/admin-auth.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/pages/admin/cars.js"></script>
</body>
</html>
