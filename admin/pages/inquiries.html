<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Inquiries</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

  <!-- ✅ no blink auth guard -->
  <script src="../../assets/js/admin-auth.js"></script>
  <script>
    AdminAuth.requireAuth("../login.html");
  </script>

  <style>
    body{ font-family: Arial, sans-serif; margin:0; background:#f5f7fb; color:#0f172a; }
    .wrap{ width:min(1200px, calc(100% - 30px)); margin: 24px auto; }
    .top{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    h1{ margin:0; }
    .btn{ border:0; padding:10px 12px; border-radius:10px; cursor:pointer; font-weight:700; }
    .btn-dark{ background:#0f172a; color:#fff; }
    .btn-light{ background:#fff; border:1px solid #e8edf6; }
    .card{ background:#fff; border:1px solid #e8edf6; border-radius:14px; padding:14px; margin-top:14px; }
    table{ width:100%; border-collapse:collapse; }
    th,td{ padding:12px; border-bottom:1px solid #eef2ff; text-align:left; vertical-align:top; }
    th{ font-size:12px; text-transform:uppercase; letter-spacing:.03em; color:#334155; }
    .pill{ display:inline-block; padding:6px 10px; border-radius:999px; font-weight:800; font-size:12px; }
    .unread{ background:#fff7ed; color:#b45309; border:1px solid #fed7aa; }
    .read{ background:#ecfdf5; color:#15803d; border:1px solid #bbf7d0; }
    .muted{ color:#64748b; font-weight:600; }
    .actions{ display:flex; gap:8px; flex-wrap:wrap; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Inquiries</h1>
        <div class="muted">Customer messages (LocalStorage DB)</div>
      </div>
      <div class="actions">
        <a class="btn btn-light" href="../dashboard.html"><i class="fa-solid fa-arrow-left"></i> Back</a>
        <button class="btn btn-dark" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="top" style="margin-bottom:10px;">
        <div class="muted">Unread: <b id="unreadCount">0</b></div>
        <button class="btn btn-light" id="btnRefresh"><i class="fa-solid fa-rotate"></i> Refresh</button>
      </div>

      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>Customer</th>
              <th>Subject</th>
              <th>Message</th>
              <th>Status</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tbl">
            <tr><td colspan="6" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ✅ common DB -->
 <script src="/assets/js/storage.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    function fmt(d){
      const dt = new Date(d);
      return isNaN(dt.getTime()) ? "-" : dt.toLocaleString();
    }

    function render(){
      const list = AppDB.getInquiries();
      const unread = list.filter(x => (x.status||"").toLowerCase() === "unread").length;
      $("unreadCount").textContent = unread;

      const tb = $("tbl");
      if (!list.length){
        tb.innerHTML = `<tr><td colspan="6" class="muted">No inquiries yet.</td></tr>`;
        return;
      }

      tb.innerHTML = list.map(x => {
        const isUnread = (x.status||"").toLowerCase() === "unread";
        return `
          <tr>
            <td>
              <div style="font-weight:800">${x.customerName || "Customer"}</div>
              <div class="muted">${x.customerEmail || ""}</div>
              ${x.phone ? `<div class="muted">Phone: ${x.phone}</div>` : ``}
            </td>
            <td style="font-weight:700">${x.subject || "Inquiry"}</td>
            <td style="max-width:520px;">${(x.message||"").replaceAll("<","&lt;")}</td>
            <td>
              <span class="pill ${isUnread ? "unread" : "read"}">${isUnread ? "Unread" : "Read"}</span>
            </td>
            <td class="muted">${fmt(x.createdAt)}</td>
            <td>
              <div class="actions">
                ${isUnread ? `<button class="btn btn-light" data-read="${x.id}">Mark Read</button>` : ``}
                <button class="btn btn-light" data-del="${x.id}">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    $("btnRefresh").addEventListener("click", render);

    document.addEventListener("click", (e) => {
      const r = e.target.closest("[data-read]");
      const d = e.target.closest("[data-del]");
      if (r){
        AppDB.markInquiryRead(r.getAttribute("data-read"));
        render();
      }
      if (d){
        AppDB.deleteInquiry(d.getAttribute("data-del"));
        render();
      }
    });

    $("btnLogout").addEventListener("click", () => {
      AdminAuth.logout();
      window.location.replace("../login.html");
    });

    render();
  </script>
</body>
</html>
