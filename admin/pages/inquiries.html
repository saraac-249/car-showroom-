<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inquiries | Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
  <main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h3 class="mb-0">Inquiries</h3>
      <div class="text-muted">Unread: <span id="unreadCount">0</span></div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Customer</th>
            <th>Subject</th>
            <th>Message</th>
            <th>Status</th>
            <th>Date</th>
            <th class="text-end">Action</th>
          </tr>
        </thead>
        <tbody id="inquiriesBody"></tbody>
      </table>
    </div>

    <div id="emptyState" class="text-center text-muted py-5 d-none">
      No inquiries found.
    </div>
  </main>

  <script src="../../assets/js/admin-auth.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/pages/admin/inquiries.js"></script>
</body>
</html>
